{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-6 shadow-md dark:shadow-lg mt-10 transition-colors duration-300">
  <h1 class="text-2xl font-bold text-primary mb-6 border-b border-gray-200 dark:border-gray-700 pb-2">Login_</h1>
  <form method="post" class="space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div>
      <label class="block text-sm text-gray-700 dark:text-gray-400 mb-1">Username</label>
      <input name="username" required class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded p-2 text-gray-900 dark:text-white focus:outline-none focus:border-primary transition-colors duration-300">
    </div>
    <div>
      <label class="block text-sm text-gray-700 dark:text-gray-400 mb-1">Password</label>
      <input name="password" type="password" required class="w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 rounded p-2 text-gray-900 dark:text-white focus:outline-none focus:border-primary transition-colors duration-300">
    </div>
    {% if challenge_question %}
    <div class="p-3 bg-red-50 dark:bg-red-900/30 border border-red-300 dark:border-red-500/50 rounded transition-colors duration-300">
      <label class="block text-sm text-red-600 dark:text-red-400 mb-1">Security Challenge (Required)</label>
      <div class="text-xs text-gray-600 dark:text-gray-400 mb-2">{{ challenge_question }}</div>
      <input name="challenge_answer" required class="w-full bg-white dark:bg-gray-900 border border-red-400 dark:border-red-600 rounded p-2 text-gray-900 dark:text-white focus:outline-none focus:border-red-500 transition-colors duration-300">
    </div>
    {% endif %}
    <button type="submit" class="w-full bg-primary text-white dark:text-gray-900 font-bold py-2 rounded hover:bg-green-500 dark:hover:bg-green-400 transition mt-4">Authenticate</button>
  </form>
</div>
{% endblock %}

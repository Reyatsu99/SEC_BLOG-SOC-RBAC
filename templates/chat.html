{% extends 'base.html' %}
{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<div class="grid grid-cols-3 gap-6 h-[600px]">
  
  <div class="col-span-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-4 overflow-y-auto shadow-sm dark:shadow-md transition-colors duration-300">
    <h2 class="text-lg font-bold text-primary mb-4 border-b border-gray-200 dark:border-gray-700 pb-2">Active Targets</h2>
    <ul>
      {% for user in users %}
        <li class="mb-2">
          <button onclick="selectUser({{ user.id }}, '{{ user.username }}', '{{ user.chat_key }}')" class="w-full text-left p-3 bg-gray-50 dark:bg-gray-900 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-800 dark:text-gray-200 rounded border border-gray-200 dark:border-gray-700 transition-colors duration-300">
            > {{ user.username }}
          </button>
        </li>
      {% endfor %}
    </ul>
  </div>

  <div class="col-span-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg flex flex-col relative shadow-sm dark:shadow-md transition-colors duration-300">
    
    <div class="p-4 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 flex justify-between items-center rounded-t-lg transition-colors duration-300">
      <div>
        <h2 id="chatHeader" class="text-lg font-bold text-gray-500 dark:text-gray-400">Select a user to begin...</h2>
        <div id="typingIndicator" class="hidden text-xs text-primary italic mt-0.5">
          <span class="inline-flex items-center gap-1">
            <span class="flex space-x-0.5">
              <span class="w-1 h-1 bg-primary rounded-full animate-bounce" style="animation-delay: 0ms"></span>
              <span class="w-1 h-1 bg-primary rounded-full animate-bounce" style="animation-delay: 150ms"></span>
              <span class="w-1 h-1 bg-primary rounded-full animate-bounce" style="animation-delay: 300ms"></span>
            </span>
            <span id="typingText">typing...</span>
          </span>
        </div>
      </div>
      <div id="encryptionBadge" class="hidden px-2 py-1 text-xs font-bold rounded bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-300 border border-green-400 dark:border-green-500">AES-256 ENCRYPTED</div>
    </div>

    <div id="messagesArea" class="flex-grow p-4 overflow-y-auto space-y-4">
      </div>

    <div id="cryptoInspector" class="hidden bg-black border-t border-gray-700 p-3 font-mono text-[10px] text-green-500 overflow-hidden">
      <div class="text-gray-400 mb-1 border-b border-gray-800 pb-1 font-bold">LIVE CRYPTOGRAPHIC PAYLOAD INSPECTOR</div>
      <div>> Plaintext: <span id="debugPlain" class="text-white"></span></div>
      <div>> AES-256 Ciphertext: <span id="debugCipher" class="text-yellow-400 break-all"></span></div>
    </div>

    <div class="p-4 bg-gray-50 dark:bg-gray-900 border-t border-gray-200 dark:border-gray-700 rounded-b-lg flex space-x-2 transition-colors duration-300">
      <input type="text" id="messageInput" class="flex-grow bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded p-2 text-gray-900 dark:text-white focus:outline-none focus:border-primary disabled:opacity-50 transition-colors duration-300" placeholder="Type a message..." disabled onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" id="sendBtn" class="bg-primary text-white dark:text-gray-900 font-bold px-6 py-2 rounded hover:bg-green-500 dark:hover:bg-green-400 disabled:opacity-50 transition" disabled>SEND</button>
    </div>
  </div>
</div>

<script>
  let currentTargetId = null;
  let currentTargetName = null;
  let currentChatKey = null;
  let typingTimer = null;
  const CSRF_TOKEN = "{{ csrf_token }}";
  const MY_USERNAME = "{{ current_user.username }}";
  
  function selectUser(userId, username, chatKey) {
    currentTargetId = userId;
    currentTargetName = username;
    currentChatKey = chatKey;
    document.getElementById('chatHeader').innerText = `Encrypted Channel: ${username}`;
    document.getElementById('messageInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    fetchMessages();
    // Use an interval ID so we don't pile up intervals
    if(window.chatInterval) clearInterval(window.chatInterval);
    window.chatInterval = setInterval(fetchMessages, 5000);
    if(window.typingInterval) clearInterval(window.typingInterval);
    window.typingInterval = setInterval(checkTyping, 2000);
  }

  function getMode() {
    return document.getElementById('securityToggle').value;
  }

  document.getElementById('securityToggle').addEventListener('change', function(e) {
    const badge = document.getElementById('encryptionBadge');
    badge.className = 'px-2 py-1 text-xs font-bold rounded border transition-colors duration-300';
    
    if (e.target.value === 'secure') {
      badge.classList.add('bg-green-100', 'dark:bg-green-900', 'text-green-800', 'dark:text-green-300', 'border-green-400', 'dark:border-green-500');
      badge.innerText = "AES-256 ENCRYPTED";
    } else {
      badge.classList.add('bg-red-100', 'dark:bg-red-900', 'text-red-800', 'dark:text-red-300', 'border-red-400', 'dark:border-red-500');
      badge.innerText = "PLAINTEXT VULNERABLE";
    }
  });
  
  document.getElementById('securityToggle').dispatchEvent(new Event('change'));

  // Typing indicator: send typing status on input
  document.getElementById('messageInput').addEventListener('input', function() {
    if (!currentTargetId) return;
    clearTimeout(typingTimer);
    typingTimer = setTimeout(function() {
      fetch('/api/typing', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': CSRF_TOKEN },
        body: JSON.stringify({ receiver_id: currentTargetId })
      });
    }, 300);
    // Send immediately for first keystroke
    fetch('/api/typing', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': CSRF_TOKEN },
      body: JSON.stringify({ receiver_id: currentTargetId })
    });
  });

  async function checkTyping() {
    if (!currentTargetId) return;
    try {
      const resp = await fetch(`/api/typing/${currentTargetId}`);
      const data = await resp.json();
      const indicator = document.getElementById('typingIndicator');
      const typingText = document.getElementById('typingText');
      if (data.typing) {
        typingText.innerText = `${currentTargetName} is typing...`;
        indicator.classList.remove('hidden');
      } else {
        indicator.classList.add('hidden');
      }
    } catch(e) {}
  }

  async function sendMessage() {
    const input = document.getElementById('messageInput');
    const rawText = input.value.trim();
    if (!rawText || !currentTargetId || !currentChatKey) return;

    const mode = getMode();
    let payloadContent = rawText;
    let isEncrypted = 0;

    if (mode === 'secure') {
      payloadContent = CryptoJS.AES.encrypt(rawText, currentChatKey).toString();
      isEncrypted = 1;
      
      // Update Inspector UI
      document.getElementById('cryptoInspector').classList.remove('hidden');
      document.getElementById('debugPlain').innerText = rawText;
      document.getElementById('debugCipher').innerText = payloadContent;
    } else {
      document.getElementById('cryptoInspector').classList.add('hidden');
    }

    await fetch('/api/messages/send', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'X-CSRF-Token': CSRF_TOKEN
      },
      body: JSON.stringify({
        receiver_id: currentTargetId,
        content: payloadContent,
        is_encrypted: isEncrypted
      })
    });

    input.value = '';
    fetchMessages();
  }

  async function fetchMessages() {
    if (!currentTargetId) return;
    const response = await fetch(`/api/messages/${currentTargetId}`);
    const data = await response.json();
    
    const container = document.getElementById('messagesArea');
    container.innerHTML = '';
    const mode = getMode();

    data.messages.forEach(msg => {
      let displayText = msg.content;
      let securityWarning = '';

      if (msg.is_encrypted && mode === 'secure' && currentChatKey) {
        try {
          const bytes = CryptoJS.AES.decrypt(msg.content, currentChatKey);
          displayText = bytes.toString(CryptoJS.enc.Utf8);
        } catch(e) {
          displayText = "[Decryption Failed]";
        }
      } else if (msg.is_encrypted && mode === 'vulnerable') {
         securityWarning = '<div class="text-[10px] text-green-600 dark:text-green-400 mt-1">Cannot read: Ciphertext</div>';
      } else if (!msg.is_encrypted) {
         securityWarning = '<div class="text-[10px] text-red-600 dark:text-red-400 mt-1">Warning: Sent in Plaintext!</div>';
      }

      const isMine = msg.sender === MY_USERNAME;
      const alignClass = isMine ? 'justify-end' : 'justify-start';
      const bubbleClass = isMine ? 'bg-primary text-white dark:text-gray-900' : 'bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-100';

      // Read receipt ticks for sent messages
      let readReceipt = '';
      if (isMine) {
        if (msg.read_at) {
          readReceipt = '<span class="text-[10px] opacity-70 ml-1" title="Read">✓✓</span>';
        } else {
          readReceipt = '<span class="text-[10px] opacity-40 ml-1" title="Delivered">✓</span>';
        }
      }

      container.innerHTML += `
        <div class="flex ${alignClass} mb-4">
          <div class="max-w-[70%] p-3 rounded-lg ${bubbleClass} shadow-sm break-words text-sm transition-colors duration-300">
            ${displayText}
            ${securityWarning}
            <div class="flex items-center justify-end mt-1 gap-1">
              <span class="text-[9px] opacity-50">${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}</span>
              ${readReceipt}
            </div>
          </div>
        </div>
      `;
    });
    container.scrollTop = container.scrollHeight;
  }
</script>
{% endblock %}
